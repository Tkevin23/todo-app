<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>To-Do</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #000000;
    display: flex;
    justify-content: center;
    padding-top: 50px;
}
.container {
    width: 420px;
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    gap: 10px;
}
h2 {
    text-align: center;
    margin-bottom: 15px;
}

input {
    width: 65%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #fc0707;
    outline: none;
}

button {
    padding: 10px 12px;
    border: none;
    border-radius: 10px;
    background: #080000;
    color: rgb(245, 243, 243);
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 15px;
}

li {
    list-style: none;
    background: #fcfcfc;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.2s;
}

li:hover {
    transform: scale(1.02);
}

li span:hover {
    opacity: 0.7;
}

li button {
    background: #070000;
    padding: 6px 10px;
    border-radius: 8px;
}

.tabs {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
    gap: 5px;
}

.tabs button {
    flex: 1;
    background: rgba(255,255,255,0.1);
}

.tabs button:hover {
    background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container">

    <input id="taskInput" placeholder="задача">
    <button onclick="addTask()">+</button>

    <select id="priority">
        <option value="low">Обычная</option>
        <option value="medium">Средняя</option>
        <option value="high">Важная</option>
    </select>

    <ul id="list"></ul>

    <div style="margin-top:10px;">
        <button onclick="setFilter('all')">Все</button>
        <button onclick="setFilter('active')">Активные</button>
        <button onclick="setFilter('done')">Выполненные</button>
    </div>

</div>
<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";
let draggedIndex = null;
function setFilter(type) {
    filter = type;
    render();
}

function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let filtered = tasks;

    if (filter === "active") {
        filtered = tasks.filter(t => !t.done);
    }

    if (filter === "done") {
        filtered = tasks.filter(t => t.done);
    }

    
        

    localStorage.setItem("tasks", JSON.stringify(tasks));

    filtered.forEach((task, i) => {
      list.innerHTML += `
<li draggable="true" data-index="${i}"
    style="
        border-left: 6px solid ${
            task.priority === 'high' ? 'red' :
            task.priority === 'medium' ? 'orange' :
            '#999'
        };
        padding: 8px;
        margin-top: 8px;
    "
    ondragstart="dragStart(event)"
    ondragover="dragOver(event)"
    ondrop="drop(event)"
>
    <span
        onclick="toggle(${i})"
        ondblclick="editTask(${i})"
        style="
            cursor:pointer;
            text-decoration:${task.done ? 'line-through' : 'none'};
            opacity:${task.done ? '0.5' : '1'};
        ">
        <div>${task.text}</div>
        <small>${task.created || ""}</small>
    </span>

    <button onclick="del(${i})">X</button>
</li>`;
    });

    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    let input = document.getElementById("taskInput");

    let text = input.value.trim();
    if (text === "") return;

    tasks.push({
    text: text,
    done: false,
    created: new Date().toLocaleString()
});

    input.value = "";
    render();
}

function toggle(i) {
    tasks[i].done = !tasks[i].done;
    render();
}

function del(i) {
    tasks.splice(i, 1);
    render();
}
function dragStart(e) {
    draggedIndex = e.target.closest("li").dataset.index;
}

function dragOver(e) {
    e.preventDefault();
}

function drop(e) {
    let targetIndex = e.target.closest("li").dataset.index;

    if (draggedIndex === null) return;

    let temp = tasks[draggedIndex];
    tasks.splice(draggedIndex, 1);
    tasks.splice(targetIndex, 0, temp);

    draggedIndex = null;
    render();
}
render();

document.getElementById("taskInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        addTask();
    }
});
</script>

</body>
</html>
